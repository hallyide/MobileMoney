<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Espace Client</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="theme-auth" id="page-client-login">

  <div class="auth-card">
    <div class="auth-mark">F</div>
    <h1>Espace Client</h1>
    <p class="sub">Entrez votre numéro de compte pour continuer</p>

    <div class="form-error" id="loginError"></div>

    <form id="formClientLogin">
      <div class="field">
        <label for="loginNumero">Numéro de compte</label>
        <input class="input input-mono" id="loginNumero" placeholder="ex : 0341234567" required>
        <span class="hint-sm">Comptes de démonstration : 0341234567, 0389876543, 0331122334, 0325566778</span>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Valider</button>
    </form>

    <p class="auth-foot"><a href="../index.html" style="color:var(--gold-soft)">← Retour au portail</a></p>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
